<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234488FF'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='system-ui'%3E%E2%9B%B0%3C/text%3E%3C/svg%3E" />
		<title>Stylized floating island 3D web application</title>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<div id="root">
			<canvas id="canvas"></canvas>
		</div>
		<div id="time-overlay">
			<div id="time-overlay-left">
				<div id="time-display">00:00:00</div>
				<div id="date-display">01.01.2025</div>
			</div>
			<div id="time-overlay-right" hidden>
				<div id="location-display"></div>
				<div id="location-weather-display"></div>
			</div>
		</div>
		<div id="slider-ui">
			<label id="slider-label" for="time-slider">TIME OF DAY</label>
			<div id="slider-row">
				<input type="range" id="time-slider" min="0" max="1440" step="1" value="720" />
				<button type="button" id="reset-btn">&#8635; Reset</button>
			</div>
		</div>
		<div id="audio-start-overlay" class="audio-start-overlay">
			<div class="audio-start-card">
				<p class="audio-start-title">Floating island</p>
				<p class="audio-start-hint">Tap below to start experiencing the cozy floating island clock.</p>
				<button type="button" id="audio-start-btn" class="audio-start-btn">Enter</button>
			</div>
		</div>
		<div id="weather-controls">
			<div id="weather-controls-row">
				<button type="button" id="audio-toggle" title="Audio" aria-haspopup="dialog" aria-expanded="false">
					<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
				</button>
				<button type="button" id="perf-toggle" title="Performance" aria-haspopup="dialog" aria-expanded="false">
					<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M2 12h2"/><path d="M19.07 4.93l-1.41 1.41"/><path d="M22 12h-2"/><path d="m19.07 19.07-1.41-1.41"/><path d="M12 2v2"/><path d="m4.93 19.07 1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
				</button>
				<button type="button" id="fullscreen-toggle" aria-pressed="false" title="Fullscreen"></button>
				<button type="button" id="weather-label" title="Weather (title set on load)"></button>
			</div>
			<div id="weather-countdown"></div>
		</div>
		<dialog id="audio-dialog" aria-labelledby="audio-dialog-title">
			<div id="audio-dialog-inner">
				<header id="audio-dialog-header">
					<h2 id="audio-dialog-title">Audio</h2>
					<button type="button" id="audio-dialog-close" aria-label="Close">&#10005;</button>
				</header>
				<div class="audio-mixer-rows">
					<label class="audio-mixer-label" for="audio-slider-master">Master</label>
					<input type="range" id="audio-slider-master" min="0" max="1" step="0.01" value="0.85" />
					<label class="audio-mixer-label" for="audio-slider-music">Theme</label>
					<input type="range" id="audio-slider-music" min="0" max="1" step="0.01" value="0.55" />
					<label class="audio-mixer-label" for="audio-slider-music-bed">Background</label>
					<input type="range" id="audio-slider-music-bed" min="0" max="1" step="0.01" value="0.45" />
					<label class="audio-mixer-label" for="audio-slider-weather">Weather</label>
					<input type="range" id="audio-slider-weather" min="0" max="1" step="0.01" value="0.5" />
				</div>
			</div>
		</dialog>
		<dialog id="perf-dialog" aria-labelledby="perf-dialog-title">
			<div id="perf-dialog-inner">
				<header id="perf-dialog-header">
					<h2 id="perf-dialog-title">Performance</h2>
					<button type="button" id="perf-dialog-close" aria-label="Close">&#10005;</button>
				</header>
				<div id="perf-stats-mount"></div>
				<pre id="perf-details" aria-live="polite"></pre>
				<section id="perf-warnings-section">
					<h3 id="perf-warnings-heading">Warnings &amp; errors (Three.js / WebGL)</h3>
					<pre id="perf-warnings"></pre>
				</section>
			</div>
		</dialog>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
